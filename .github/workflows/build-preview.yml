name: Build Preview AAB

on:
  push:
    branches: [feature/ui-adaptive-tags-revamp]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: cd mobile && npm ci

      - name: Setup EAS CLI
        run: npm install -g eas-cli

      - name: Build AAB (production)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          cd mobile
          eas build --platform android --profile production --local --non-interactive --output ./build.aab

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: triggermap-v44-aab
          path: mobile/build.aab
          retention-days: 30
