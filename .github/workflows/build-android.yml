name: Build Android APK + AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: cd mobile && npm ci

      - name: Setup EAS CLI
        run: npm install -g eas-cli

      - name: Build APK (preview)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          cd mobile
          eas build --platform android --profile preview --local --non-interactive --output ./build.apk

      - name: Build AAB (production)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          cd mobile
          eas build --platform android --profile production --local --non-interactive --output ./build.aab

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: triggermap-preview-apk
          path: mobile/build.apk
          retention-days: 30

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: triggermap-production-aab
          path: mobile/build.aab
          retention-days: 30
