name: Build Android AAB

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK r28
        run: sdkmanager --install "ndk;28.0.12433566"

      - name: Install dependencies
        run: cd mobile && npm ci

      - name: Setup EAS CLI
        run: npm install -g eas-cli@12.6.2

      - name: Build AAB (production)
        env:
          EXPO_TOKEN: "${{ secrets.EXPO_TOKEN }}"
          EAS_LOCAL_BUILD_SKIP_CREDENTIALS_CHECK: "1"
        run: |
          cd mobile
          eas build --platform android --profile production --local --non-interactive --output ./build.aab

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: triggermap-production-aab
          path: mobile/build.aab
          retention-days: 30
